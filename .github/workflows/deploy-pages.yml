name: Deploy Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Inject Supabase credentials
        run: |
          sed -i 's|{{SUPABASE_URL}}|${{ secrets.SUPABASE_URL }}|g' dashboard/index.html
          sed -i 's|{{SUPABASE_PUBLIC_KEY}}|${{ secrets.SUPABASE_PUBLIC_KEY }}|g' dashboard/index.html

      - name: Deploy to GitHub Pages
        run: |
          npm install gh-pages
          npm run build
          npx gh-pages -d dashboard/dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
